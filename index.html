<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مدار کد</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="brand">
      <svg width="26" height="20" viewBox="0 0 32 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="4" cy="16" r="2.5" stroke="#e8a33d" stroke-width="2"/>
        <circle cx="28" cy="16" r="2.5" stroke="#e8a33d" stroke-width="2"/>
        <line x1="6.5" y1="16" x2="14" y2="16" stroke="#e8a33d" stroke-width="2"/>
        <line x1="22" y1="16" x2="25.5" y2="16" stroke="#e8a33d" stroke-width="2"/>
        <line x1="14" y1="16" x2="24" y2="6" stroke="#e8a33d" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <h1>مدار کد</h1>
    </div>
    <button class="run-btn" id="runBtn">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      اجرا
    </button>
  </div>

  <div class="layout">

    <div class="rail" id="rail">
      <button class="rail-tab active" data-lang="html">
        <span class="dot" id="dot-html"></span> HTML
      </button>
      <button class="rail-tab" data-lang="css">
        <span class="dot" id="dot-css"></span> CSS
      </button>
      <button class="rail-tab" data-lang="js">
        <span class="dot" id="dot-js"></span> JavaScript
      </button>
      <button class="rail-tab" data-lang="python">
        <span class="dot" id="dot-python"></span> Python
      </button>
      <p class="rail-note">هر بار که «اجرا» رو می‌زنی، مدار چک می‌شه. اگه یه جای کد قطعی داشته باشه، همون بخش قرمز می‌شه.</p>
    </div>

    <div class="workspace">

      <div class="editor-region">
        <div class="editor-pane active" id="pane-html">
          <textarea class="code-input" id="editor-html" spellcheck="false">&lt;h1&gt;سلام دنیا!&lt;/h1&gt;
&lt;p&gt;این یک متن نمونه‌ست.&lt;/p&gt;
&lt;button onclick="sayHi()"&gt;کلیک کن&lt;/button&gt;</textarea>
        </div>

        <div class="editor-pane" id="pane-css">
          <textarea class="code-input" id="editor-css" spellcheck="false">body {
  font-family: sans-serif;
  background: #f4f4fb;
  color: #22223b;
  padding: 24px;
  text-align: center;
}
h1 { color: #e8a33d; }
button {
  background: #e8a33d;
  color: #1a1305;
  border: none;
  padding: 10px 20px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}</textarea>
        </div>

        <div class="editor-pane" id="pane-js">
          <textarea class="code-input" id="editor-js" spellcheck="false">function sayHi() {
  alert("سلام! این پیام از جاوااسکریپت اومد.");
}
console.log("صفحه لود شد");</textarea>
        </div>

        <div class="editor-pane" id="pane-python">
          <textarea class="code-input" id="editor-python" spellcheck="false">print("سلام دنیا از پایتون!")

for i in range(5):
    print("i =", i)</textarea>
        </div>
      </div>

      <div class="divider" id="divider"></div>

      <div class="output-region">
        <div class="output-header">
          <span class="status-label" id="statusLabel">
            <span class="dot" id="dot-status"></span> آماده — هنوز اجرا نشده
          </span>
          <button class="icon-btn" id="openWindowBtn" disabled>باز کردن در پنجره جدید</button>
        </div>
        <div class="output-body">
          <div class="placeholder" id="placeholder">
            کد رو بنویس، بعد دکمه <strong>▶ اجرا</strong> رو بزن تا وضعیت مدار رو ببینی.
          </div>
          <iframe class="preview-frame" id="previewFrame" sandbox="allow-scripts allow-modals allow-forms"></iframe>
          <div class="console-box" id="consoleBox"></div>
          <div class="error-list" id="errorList"></div>
        </div>
      </div>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
