<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پلی‌گراند کد</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <div class="header">
    <h1>پلی‌گراند کد</h1>
    <button class="run-btn" id="runBtn">▶ اجرا</button>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-lang="html">HTML</button>
    <button class="tab" data-lang="css">CSS</button>
    <button class="tab" data-lang="js">JavaScript</button>
    <button class="tab" data-lang="python">Python</button>
  </div>

  <div class="main">

    <!-- HTML editor -->
    <div class="pane active" id="pane-html">
      <textarea class="code-input" id="editor-html" spellcheck="false">&lt;h1&gt;سلام دنیا!&lt;/h1&gt;
&lt;p&gt;این یک متن نمونه است.&lt;/p&gt;
&lt;button onclick="sayHi()"&gt;کلیک کن&lt;/button&gt;</textarea>
    </div>

    <!-- CSS editor -->
    <div class="pane" id="pane-css">
      <textarea class="code-input" id="editor-css" spellcheck="false">body {
  font-family: sans-serif;
  background: #f4f4fb;
  color: #22223b;
  padding: 24px;
  text-align: center;
}
h1 { color: #7c6ff2; }
button {
  background: #7c6ff2;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
}</textarea>
    </div>

    <!-- JS editor -->
    <div class="pane" id="pane-js">
      <textarea class="code-input" id="editor-js" spellcheck="false">function sayHi() {
  alert("سلام! این پیام از جاوااسکریپت اومد.");
}
console.log("صفحه لود شد");</textarea>
    </div>

    <!-- Python editor -->
    <div class="pane" id="pane-python">
      <textarea class="code-input" id="editor-python" spellcheck="false">print("سلام دنیا از پایتون!")

for i in range(5):
    print("i =", i)</textarea>
    </div>

  </div>

  <!-- Output area: iframe for HTML/CSS/JS, console div for Python -->
  <div class="divider" id="divider"></div>
  <div class="output-section" id="outputSection">
    <div class="output-header">
      <span id="outputLabel">پیش‌نمایش زنده</span>
      <button class="icon-btn" id="openWindowBtn">باز کردن در پنجره جدید</button>
    </div>
    <iframe class="preview-frame" id="previewFrame" sandbox="allow-scripts allow-modals allow-forms"></iframe>
    <div class="console-output" id="pyOutput" style="display:none;"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
<script src="script.js"></script>
</body>
</html>
